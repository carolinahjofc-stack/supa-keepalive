name: Supabase Keep-Alive

on:
  schedule:
    # Cada 3 dias a las 6:00 AM UTC (margen seguro dentro de los 7 dias)
    - cron: "0 6 */3 * *"
  workflow_dispatch: {}   # Permite ejecutarlo manualmente para probar

permissions:
  contents: write          # Necesario para el heartbeat commit

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ping Flowers & Gifts by Luna
        run: |
          curl -s "${{ secrets.LUNA_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.LUNA_KEY }}" \
            -w "\nLuna HTTP: %{http_code}\n"

      - name: Ping Mentorias Maranata (Saydee)
        run: |
          curl -sS "${{ secrets.SAYDEE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SAYDEE_KEY }}" \
            -w "\nSaydee HTTP: %{http_code}\n"
           

      - name: Ping ScooterMax Pro
        run: |
          curl -sS "${{ secrets.SCOOTER_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SCOOTER_KEY }}" \
            -w "\nScooterMax HTTP: %{http_code}\n" 

      - name: Ping Fixaro
        run: |
          curl -sS "${{ secrets.FIXARO_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.FIXARO_KEY }}" \
            -w "\nFixaro HTTP: %{http_code}\n" 

      - name: Heartbeat (evita que GitHub desactive el cron a los 60 dias)
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last-ping.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-ping.txt
          git commit -m "keep-alive heartbeat" || exit 0
          git push

